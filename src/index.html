<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MILLI — JAA-EHH ASIA TOUR 2026</title>
    <meta name="description" content="MILLI JAA-EHH ASIA TOUR 2026 — full-screen artwork, minimal tour dates, and clean footer." />
    <meta property="og:title" content="MILLI — JAA-EHH ASIA TOUR 2026" />
    <meta property="og:description" content="Full-screen hero artwork with a minimal tour date list." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#DA2D40" />

    <!-- Fonts: Kuunari + Gotham (local), fallback to Space Grotesk + Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      window.tailwind = {
        config: {
          theme: {
            extend: {
              colors: {
                obsidian: '#0A0A0A',
                milliRed: '#DA2D40',
                silver: '#A0A0A0'
              },
              fontFamily: {
                headline: ['Kuunari', 'Space Grotesk', 'sans-serif'],
                body: ['Gotham', 'Inter', 'sans-serif'],
                mono: ['IBM Plex Mono', 'ui-monospace', 'monospace']
              }
            }
          }
        }
      };
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" crossorigin></script>

    <style>
      /* Custom fonts (local files if available) */
      @font-face { font-family: 'Kuunari'; src: url('fonts/kuunari-black-condensed.otf') format('opentype'); font-display: swap; }
      @font-face { font-family: 'Gotham'; src: url('fonts/Gotham-Bold.otf') format('opentype'); font-display: swap; }

      :root { color-scheme: dark; }
      html { scroll-behavior: smooth; background: #0a0a0a; }
      body { margin: 0; background: #0a0a0a; }

      .hero-kv {
        background-image: url('https://lh3.googleusercontent.com/d/1O01RuN39YZoxKRqYumS1OFJ7rzbl1aDn');
        background-size: cover;
        background-position: center;
      }

      .billboard-img {
        background-image: url('https://lh3.googleusercontent.com/d/1XhHiSV1EeCzHYEDFN8eOQt2H6_ZiO4AA');
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
      }

      .row-divider::after {
        content: '';
        position: absolute;
        inset: auto 0 0 0;
        height: 1px;
        background: rgba(255, 255, 255, 0.12);
      }

      .billboard-container { perspective: 1000px; }
      .billboard-card { transform-style: preserve-3d; backface-visibility: hidden; }

      .merch-card { perspective: 800px; }
      .merch-card:hover .merch-inner { transform: rotateY(8deg) rotateX(-3deg); }
      .merch-inner { transition: transform 0.5s ease; transform-style: preserve-3d; }

      .scramble-cursor {
        display: inline-block;
        width: 2px;
        height: 1.1em;
        background: #fff;
        margin-left: 3px;
        animation: blink 0.7s step-end infinite;
        vertical-align: text-bottom;
      }
      @keyframes blink { 50% { opacity: 0; } }
    </style>
  </head>
  <body class="bg-obsidian text-white selection:bg-milliRed selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useRef, useState } = React;

      /* ─── DATA ─── */
      const TOUR_DATES = [
        { id: 1, date: '26 JUN 2026', city: 'HONG KONG', badge: 'SHOW', cta: 'TICKETS' },
        { id: 2, date: '27 JUN 2026', city: 'TRAVEL DAY', badge: 'TRAVEL', cta: 'INFO' },
        { id: 3, date: '28 JUN 2026', city: 'TAIPEI', badge: 'SHOW', cta: 'TICKETS' },
        { id: 4, date: '03 JUL 2026', city: 'HONG KONG', badge: 'OPTION', cta: 'WAITLIST' },
        { id: 5, date: '10 JUL 2026', city: 'SINGAPORE', badge: 'SHOW', cta: 'TICKETS' },
        { id: 6, date: '11 JUL 2026', city: 'KUALA LUMPUR', badge: 'SHOW', cta: 'TICKETS' },
        { id: 7, date: '17—18 JUL 2026', city: 'SINGAPORE / KUALA LUMPUR', badge: 'OPTION', cta: 'WAITLIST' },
        { id: 8, date: 'JUL—SEP 2026', city: 'MANILA / INDONESIA / JAPAN / CHINA', badge: 'TBC', cta: 'NOTIFY' },
        { id: 9, date: '03 OCT 2026', city: 'BANGKOK', badge: 'HOMECOMING', cta: 'TICKETS' }
      ];

      const TOUR_CITIES = [
        'TAIWAN', 'HONG KONG', 'SINGAPORE', 'MALAYSIA', 'JAPAN',
        'PHILIPPINES', 'INDONESIA', 'CHINA', 'THAILAND', 'SOUTH KOREA'
      ];

      const badgeClassMap = {
        SHOW: 'border-white/15 text-white',
        TRAVEL: 'border-white/15 text-silver',
        OPTION: 'border-white/20 text-white',
        TBC: 'border-dashed border-white/30 text-silver',
        HOMECOMING: 'border-milliRed text-milliRed'
      };

      /* ─── SCRAMBLE UTILITY ─── */
      function scrambleText(node, finalText, duration = 0.5) {
        if (!node || !window.gsap) return;
        const state = { frame: 0 };
        const glyphs = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        window.gsap.killTweensOf(state);
        window.gsap.to(state, {
          frame: finalText.length * 2,
          duration,
          ease: 'power4.out',
          onUpdate: () => {
            const reveal = Math.floor(state.frame / 2);
            node.textContent = finalText
              .split('')
              .map((ch, i) => {
                if (ch === ' ' || ch === '/' || ch === '—') return ch;
                if (i < reveal) return finalText[i];
                return glyphs[Math.floor(Math.random() * glyphs.length)];
              })
              .join('');
          },
          onComplete: () => { node.textContent = finalText; }
        });
      }

      /* ─── SECTION 1: HERO (100vh) — KV เต็มจอ ไม่ซ้อน text ─── */
      function Hero() {
        const heroRef = useRef(null);

        useEffect(() => {
          if (!window.gsap || !heroRef.current) return;
          const el = heroRef.current;
          const handleMove = (e) => {
            const rect = el.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width - 0.5;
            const y = (e.clientY - rect.top) / rect.height - 0.5;
            window.gsap.to(el, {
              backgroundPosition: `${50 + x * 3}% ${50 + y * 3}%`,
              duration: 1,
              ease: 'power3.out'
            });
          };
          el.addEventListener('pointermove', handleMove);
          return () => el.removeEventListener('pointermove', handleMove);
        }, []);

        return (
          <section className="relative h-screen overflow-hidden">
            <div ref={heroRef} className="hero-kv absolute inset-0"></div>
            <div className="absolute inset-x-0 bottom-0 h-32 bg-gradient-to-t from-obsidian to-transparent"></div>
            <a
              href="#city-scramble"
              className="absolute bottom-6 left-1/2 z-10 -translate-x-1/2 border border-white/15 bg-black/20 px-4 py-2 font-body text-[11px] uppercase tracking-[0.28em] text-white backdrop-blur-sm transition hover:border-white/40 hover:bg-black/40"
            >
              Tour Dates
            </a>
          </section>
        );
      }

      /* ─── SECTION 2: CITY SCRAMBLE (auto-play, white on black) ─── */
      function CityScramble() {
        const textRef = useRef(null);

        useEffect(() => {
          let idx = 0;
          const run = () => {
            if (textRef.current) {
              scrambleText(textRef.current, TOUR_CITIES[idx], 0.5);
            }
            idx = (idx + 1) % TOUR_CITIES.length;
          };
          run();
          const interval = setInterval(run, 2500); // 2s display + 0.5s scramble
          return () => clearInterval(interval);
        }, []);

        return (
          <section id="city-scramble" className="relative bg-obsidian py-20 md:py-32 border-y border-white/5">
            {/* Subtle red accent lines */}
            <div className="absolute top-0 left-1/2 -translate-x-1/2 w-12 h-[2px] bg-milliRed"></div>
            <div className="text-center">
              <p className="font-body text-[10px] uppercase tracking-[0.5em] text-silver mb-6">10 Countries — June to October</p>
              <div className="flex items-center justify-center gap-3 min-h-[3.5rem]">
                <span
                  ref={textRef}
                  className="font-body text-2xl font-bold uppercase tracking-[0.35em] text-white md:text-4xl lg:text-5xl"
                >
                  {TOUR_CITIES[0]}
                </span>
                <span className="scramble-cursor"></span>
              </div>
            </div>
            <div className="absolute bottom-0 left-1/2 -translate-x-1/2 w-12 h-[2px] bg-milliRed"></div>
          </section>
        );
      }

      /* ─── SECTION 3: BILLBOARD 3D TRANSITION ─── */
      function Billboard() {
        const cardRef = useRef(null);

        useEffect(() => {
          if (!window.gsap || !window.ScrollTrigger || !cardRef.current) return;
          window.gsap.registerPlugin(window.ScrollTrigger);

          window.gsap.fromTo(
            cardRef.current,
            { rotateX: 10, scale: 0.8, opacity: 0, y: 60 },
            {
              rotateX: 0, scale: 1, opacity: 1, y: 0,
              duration: 1.2,
              ease: 'power3.out',
              scrollTrigger: {
                trigger: cardRef.current,
                start: 'top 85%',
                end: 'top 40%',
                scrub: 1,
              },
            }
          );
        }, []);

        return (
          <section className="billboard-container bg-obsidian px-5 py-12 sm:px-8 lg:px-12 lg:py-20">
            <div className="mx-auto max-w-[900px]">
              <div ref={cardRef} className="billboard-card">
                <div className="billboard-img aspect-[4/5] w-full rounded-lg md:aspect-[16/9]"></div>
              </div>
            </div>
          </section>
        );
      }

      /* ─── SECTION 4: TOUR DATES (existing, font updated) ─── */
      function TourRow({ item }) {
        const cityRef = useRef(null);
        const handleEnter = () => scrambleText(cityRef.current, item.city);

        return (
          <article
            className="row-divider group relative grid grid-cols-1 gap-4 px-0 py-5 transition-colors duration-300 hover:bg-white hover:text-black md:grid-cols-[180px_minmax(0,1fr)_auto_auto] md:items-center md:gap-6 md:py-6"
            onMouseEnter={handleEnter}
            onFocus={handleEnter}
          >
            <div className="px-5 font-body text-xs uppercase tracking-[0.24em] text-silver transition-colors duration-300 group-hover:text-black/70 md:px-6">
              {item.date}
            </div>
            <div ref={cityRef} className="px-5 font-body text-lg font-bold uppercase tracking-[0.16em] md:px-0 md:text-2xl">
              {item.city}
            </div>
            <div className="px-5 md:px-0">
              <span className={[
                'inline-flex items-center rounded-full border px-3 py-1 font-body text-[11px] uppercase tracking-[0.24em]',
                badgeClassMap[item.badge]
              ].join(' ')}>
                {item.badge}
              </span>
            </div>
            <div className="px-5 md:px-6 md:text-right">
              <a href="#" className="inline-flex items-center justify-center border border-white/15 px-4 py-2 font-body text-[11px] uppercase tracking-[0.26em] transition-colors duration-300 group-hover:border-black/20 group-hover:text-black">
                {item.cta}
              </a>
            </div>
          </article>
        );
      }

      function TourSection() {
        return (
          <section id="tour-dates" className="bg-obsidian px-5 py-14 sm:px-8 lg:px-12 lg:py-20">
            <div className="mx-auto max-w-[1280px] border border-white/10">
              <div className="border-b border-white/10 px-5 py-5 font-body text-xs uppercase tracking-[0.32em] text-silver md:px-6">
                Tour Dates
              </div>
              <div>
                {TOUR_DATES.map((item) => (
                  <TourRow key={item.id} item={item} />
                ))}
              </div>
            </div>
          </section>
        );
      }

      /* ─── SECTION 5: MERCHANDISE (dark bg, CI p.7) ─── */
      function MerchSection() {
        const sectionRef = useRef(null);

        useEffect(() => {
          if (!window.gsap || !window.ScrollTrigger || !sectionRef.current) return;
          const cards = sectionRef.current.querySelectorAll('.merch-card');
          cards.forEach((card, i) => {
            window.gsap.fromTo(card,
              { opacity: 0, y: 60 },
              {
                opacity: 1, y: 0, duration: 0.8, delay: i * 0.15, ease: 'power3.out',
                scrollTrigger: { trigger: card, start: 'top 85%' },
              }
            );
          });
        }, []);

        return (
          <section ref={sectionRef} className="bg-black px-5 py-16 sm:px-8 lg:px-12 lg:py-24">
            <div className="mx-auto max-w-[1280px]">
              <div className="mb-10 text-center">
                <p className="font-body text-xs uppercase tracking-[0.4em] text-silver">Official Tour</p>
                <h2 className="mt-2 font-headline text-3xl uppercase md:text-5xl">Merchandise</h2>
              </div>

              <div className="grid grid-cols-1 gap-8 md:grid-cols-2 lg:gap-12">
                {/* Front — dark charcoal tee with small red logo */}
                <div className="merch-card flex flex-col items-center">
                  <div className="merch-inner w-full max-w-[400px]">
                    <div className="relative aspect-[3/4] rounded-xl bg-[#111] flex items-center justify-center border border-white/5 overflow-hidden">
                      {/* T-shirt silhouette */}
                      <svg viewBox="0 0 200 240" className="w-[70%] h-auto">
                        <path d="M40,35 L20,60 L35,65 L35,220 C35,225 40,230 45,230 L155,230 C160,230 165,225 165,220 L165,65 L180,60 L160,35 L130,45 C125,48 115,50 100,50 C85,50 75,48 70,45 Z" fill="#2A2A2A" stroke="#333" strokeWidth="0.5"/>
                        {/* Small red logo on chest */}
                        <rect x="80" y="80" width="40" height="14" rx="2" fill="#DA2D40"/>
                        <text x="100" y="90" textAnchor="middle" fill="white" fontSize="6" fontWeight="bold" fontFamily="sans-serif">JAA EHH!</text>
                      </svg>
                    </div>
                  </div>
                  <p className="mt-4 font-body text-xs uppercase tracking-[0.3em] text-silver">Front</p>
                </div>

                {/* Back — KV full print + city list */}
                <div className="merch-card flex flex-col items-center">
                  <div className="merch-inner w-full max-w-[400px]">
                    <div className="relative aspect-[3/4] rounded-xl bg-[#111] flex items-center justify-center border border-white/5 overflow-hidden">
                      <svg viewBox="0 0 200 240" className="w-[70%] h-auto">
                        <defs>
                          <clipPath id="tee-back">
                            <path d="M40,35 L20,60 L35,65 L35,220 C35,225 40,230 45,230 L155,230 C160,230 165,225 165,220 L165,65 L180,60 L160,35 L130,45 C125,48 115,50 100,50 C85,50 75,48 70,45 Z"/>
                          </clipPath>
                        </defs>
                        {/* Tee shape */}
                        <path d="M40,35 L20,60 L35,65 L35,220 C35,225 40,230 45,230 L155,230 C160,230 165,225 165,220 L165,65 L180,60 L160,35 L130,45 C125,48 115,50 100,50 C85,50 75,48 70,45 Z" fill="#2A2A2A" stroke="#333" strokeWidth="0.5"/>
                        {/* KV print area */}
                        <image href="https://lh3.googleusercontent.com/d/1O01RuN39YZoxKRqYumS1OFJ7rzbl1aDn" x="50" y="55" width="100" height="75" clipPath="url(#tee-back)" preserveAspectRatio="xMidYMid slice"/>
                        {/* Tour title */}
                        <rect x="60" y="135" width="80" height="12" rx="1" fill="#DA2D40"/>
                        <text x="100" y="144" textAnchor="middle" fill="white" fontSize="5.5" fontWeight="bold" fontFamily="sans-serif">JAA EHH! ASIA TOUR 2026</text>
                        {/* City list */}
                        {TOUR_CITIES.map((city, i) => (
                          <text key={city} x="100" y={156 + i * 7} textAnchor="middle" fill="rgba(255,255,255,0.7)" fontSize="4" fontFamily="sans-serif" letterSpacing="1.5">
                            {city}
                          </text>
                        ))}
                        {/* YUPP footer */}
                        <text x="100" y="230" textAnchor="middle" fill="rgba(255,255,255,0.3)" fontSize="3.5" fontFamily="sans-serif">YUPP! ENTERTAINMENT</text>
                      </svg>
                    </div>
                  </div>
                  <p className="mt-4 font-body text-xs uppercase tracking-[0.3em] text-silver">Back</p>
                </div>
              </div>

              {/* Pre-order CTA */}
              <div className="mt-12 text-center">
                <a href="#" className="inline-flex items-center justify-center border-2 border-milliRed px-8 py-3 font-body text-sm font-bold uppercase tracking-[0.3em] text-milliRed transition-colors hover:bg-milliRed hover:text-white">
                  Pre-Order
                </a>
              </div>
            </div>
          </section>
        );
      }

      /* ─── SECTION 6: FOOTER ─── */
      function Footer() {
        return (
          <footer className="border-t border-white/10 bg-obsidian px-5 py-6 sm:px-8 lg:px-12">
            <div className="mx-auto flex max-w-[1280px] flex-col items-center gap-3 sm:flex-row sm:justify-between">
              <img src="https://lh3.googleusercontent.com/d/1Bu6B29MUjbjdAfrU5ONhpifjikvLS97F" alt="YUPP!" className="h-6 invert" />
              <p className="font-body text-[11px] uppercase tracking-[0.24em] text-silver">&copy; YUPP! Entertainment</p>
            </div>
          </footer>
        );
      }

      /* ─── APP ─── */
      function App() {
        return (
          <main>
            <Hero />
            <CityScramble />
            <Billboard />
            <TourSection />
            <MerchSection />
            <Footer />
          </main>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
