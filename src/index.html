<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MILLI — JAA EHH! ASIA TOUR 2026</title>
  <meta name="theme-color" content="#DA2D40" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    @font-face { font-family: 'Kuunari'; src: url('fonts/kuunari-black-condensed.otf') format('opentype'); font-display: swap; }
    @font-face { font-family: 'Gotham'; src: url('fonts/Gotham-Bold.otf') format('opentype'); font-display: swap; }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --red: #DA2D40; --black: #0A0A0A; }

    body {
      font-family: 'Barlow Condensed', 'Gotham', sans-serif;
      color: #fff;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== KV = THE ENTIRE BACKGROUND ===== */
    .kv-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: var(--red);
    }

    .kv-bg img {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90vw;
      max-width: 700px;
      height: auto;
      filter: drop-shadow(0 20px 60px rgba(0,0,0,0.4));
      will-change: transform;
    }

    /* Dark overlay that builds on scroll */
    .kv-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: var(--black);
      opacity: 0;
      pointer-events: none;
    }

    /* All scrollable content sits above */
    .content {
      position: relative;
      z-index: 2;
    }

    /* ===== SPACER: let user see the artwork ===== */
    .hero-spacer {
      height: 100vh;
      position: relative;
    }

    .scroll-hint {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      opacity: 0.7;
    }

    .scroll-hint span {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--black);
      margin-bottom: 8px;
    }

    .scroll-arrow {
      width: 16px; height: 16px;
      border-right: 2px solid var(--black);
      border-bottom: 2px solid var(--black);
      transform: rotate(45deg);
      margin: 0 auto;
      animation: bounce 1.5s infinite;
    }

    @keyframes bounce {
      0%,100% { transform: rotate(45deg) translateY(0); }
      50% { transform: rotate(45deg) translateY(5px); }
    }

    /* ===== TOUR DATES: glassmorphism over artwork ===== */
    .tour-section {
      padding: 60px 24px 80px;
    }

    .tour-panel {
      max-width: 900px;
      margin: 0 auto;
      background: rgba(10,10,10,0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 40px 32px;
    }

    .tour-panel h2 {
      font-family: 'Bebas Neue', 'Kuunari', sans-serif;
      font-size: clamp(36px, 5vw, 56px);
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .tour-accent {
      width: 32px; height: 3px;
      background: var(--red);
      margin-bottom: 32px;
    }

    .date-row {
      display: grid;
      grid-template-columns: 100px 1fr auto auto;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      cursor: pointer;
      transition: background 0.2s, padding-left 0.2s;
    }

    .date-row:hover {
      background: rgba(218,45,64,0.08);
      padding-left: 8px;
    }

    .date-row:last-child { border-bottom: none; }

    .d-date {
      font-weight: 600; font-size: 12px;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    .d-city {
      font-family: 'Bebas Neue', 'Kuunari', sans-serif;
      font-size: clamp(18px, 2.5vw, 26px);
      letter-spacing: 0.03em;
      transition: text-shadow 0.2s;
    }

    .date-row:hover .d-city {
      text-shadow: 1px 0 var(--red), -1px 0 rgba(0,255,255,0.2);
    }

    .d-badge {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      padding: 3px 8px;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
    }

    .d-badge.show { border-color: var(--red); color: var(--red); }
    .d-badge.homecoming { background: var(--red); border-color: var(--red); color: #fff; }
    .d-badge.tbc { border-style: dashed; color: rgba(255,255,255,0.3); }

    .d-cta {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      padding: 7px 16px;
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff; background: transparent;
      cursor: pointer; text-decoration: none;
      transition: all 0.2s; white-space: nowrap;
    }

    .d-cta:hover { background: var(--red); border-color: var(--red); }

    /* ===== MERCH: solid dark section ===== */
    .merch-section {
      background: var(--black);
      padding: 80px 24px 100px;
    }

    .merch-section h2 {
      font-family: 'Bebas Neue', 'Kuunari', sans-serif;
      font-size: clamp(36px, 5vw, 56px);
      letter-spacing: 0.06em;
      text-align: center;
      margin-bottom: 4px;
    }

    .merch-sub {
      text-align: center; font-size: 10px;
      letter-spacing: 0.5em; text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      margin-bottom: 48px;
    }

    .merch-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      max-width: 800px;
      margin: 0 auto;
    }

    .m-card {
      perspective: 800px;
    }

    .m-card-inner {
      background: #111;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.04);
      overflow: hidden;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.23,1,0.32,1), box-shadow 0.4s;
    }

    .m-card:hover .m-card-inner {
      transform: rotateY(4deg) rotateX(-2deg) scale(1.02);
      box-shadow: 0 16px 50px rgba(218,45,64,0.12);
    }

    .m-visual {
      aspect-ratio: 3/4;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      position: relative;
    }

    .m-visual::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(218,45,64,0.04), transparent);
      opacity: 0; transition: opacity 0.4s; pointer-events: none;
    }

    .m-card:hover .m-visual::after { opacity: 1; }

    .tee {
      width: 65%; max-width: 200px;
      background: #1C1C1C;
      padding: 50px 16px 24px;
      clip-path: polygon(15% 0, 0% 15%, 0% 100%, 100% 100%, 100% 15%, 85% 0, 62% 8%, 50% 10%, 38% 8%);
      text-align: center;
    }

    .m-info {
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .m-label { font-weight: 700; font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; }
    .m-detail { font-size: 9px; letter-spacing: 0.2em; color: rgba(255,255,255,0.25); margin-top: 3px; text-transform: uppercase; }
    .m-price { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--red); }

    .preorder {
      display: block;
      max-width: 360px;
      margin: 48px auto 0;
      text-align: center;
      padding: 14px 40px;
      background: var(--red);
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.15em;
      text-decoration: none;
      transition: all 0.3s;
    }

    .preorder:hover {
      background: #b71c2e;
      transform: scale(1.03);
      box-shadow: 0 0 30px rgba(218,45,64,0.25);
    }

    .preorder-note {
      text-align: center; font-size: 9px;
      letter-spacing: 0.3em; color: rgba(255,255,255,0.18);
      margin-top: 12px; text-transform: uppercase;
    }

    /* ===== FOOTER ===== */
    .site-footer {
      background: var(--black);
      border-top: 1px solid rgba(255,255,255,0.04);
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
    }

    .site-footer img { height: 16px; filter: invert(1); opacity: 0.35; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .kv-bg img { width: 95vw; }
      .tour-panel { padding: 24px 16px; }
      .date-row { grid-template-columns: 1fr; gap: 6px; padding: 12px 0; }
      .d-cta { justify-self: start; }
      .merch-grid { grid-template-columns: 1fr; max-width: 360px; }
    }
  </style>
</head>
<body>

  <!-- KV artwork = fixed background of entire page -->
  <div class="kv-bg">
    <img id="kv-img" src="assets/kv-main.jpg"
         alt="MILLI JAA-EHH! ASIA TOUR 2026" draggable="false" />
  </div>

  <!-- Dark overlay — fades in on scroll -->
  <div class="kv-overlay" id="kv-overlay"></div>

  <!-- All content scrolls over the artwork -->
  <div class="content">

    <!-- Spacer: see the artwork -->
    <div class="hero-spacer">
      <div class="scroll-hint">
        <span>Scroll</span>
        <div class="scroll-arrow"></div>
      </div>
    </div>

    <!-- Tour dates: glassmorphism panel over artwork -->
    <div class="tour-section">
      <div class="tour-panel" id="tour-panel">
        <h2>TOUR DATES</h2>
        <div class="tour-accent"></div>
        <div id="dates"></div>
      </div>
    </div>

    <!-- Merch: solid dark -->
    <section class="merch-section" id="merch-section">
      <h2>MERCHANDISE</h2>
      <p class="merch-sub">Official Tour Collection</p>

      <!-- Merch mockup from CI Deck p.7 — actual image -->
      <div style="max-width:900px; margin:0 auto;">
        <img src="assets/merch-7.png" alt="MILLI Tour Merchandise — Front and Back"
             style="width:100%; height:auto; border-radius:8px;"
             draggable="false" />
      </div>

      <a href="#" class="preorder">PRE-ORDER NOW</a>
      <p class="preorder-note">Limited Edition — Ships June 2026</p>
    </section>

    <footer class="site-footer">
      <img src="assets/logo.png" alt="YUPP!" />
      <span>&copy; 2026 YUPP! Entertainment</span>
    </footer>
  </div>

  <script>
    var CITIES = ['TAIWAN','HONG KONG','SINGAPORE','MALAYSIA','JAPAN','PHILIPPINES','INDONESIA','CHINA','THAILAND','SOUTH KOREA'];
    var TOUR = [
      { date: '26 JUN', city: 'HONG KONG', badge: 'show', cta: 'TICKETS' },
      { date: '28 JUN', city: 'TAIPEI', badge: 'show', cta: 'TICKETS' },
      { date: '03 JUL', city: 'HONG KONG', badge: '', cta: 'WAITLIST' },
      { date: '10 JUL', city: 'SINGAPORE', badge: 'show', cta: 'TICKETS' },
      { date: '11 JUL', city: 'KUALA LUMPUR', badge: 'show', cta: 'TICKETS' },
      { date: 'JUL—SEP', city: 'MANILA / JAKARTA / TOKYO / BEIJING', badge: 'tbc', cta: 'NOTIFY' },
      { date: '03 OCT', city: 'BANGKOK', badge: 'homecoming', cta: 'TICKETS' }
    ];

    /* Scramble text */
    function scramble(el, text) {
      if (!el || !gsap) return;
      var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ!@#%';
      var s = { f: 0 };
      gsap.killTweensOf(s);
      gsap.to(s, {
        f: text.length * 2, duration: 0.4, ease: 'power4.out',
        onUpdate: function() {
          var r = Math.floor(s.f / 2);
          el.textContent = text.split('').map(function(c, i) {
            if (' /—'.indexOf(c) >= 0) return c;
            return i < r ? text[i] : chars[Math.floor(Math.random() * chars.length)];
          }).join('');
        },
        onComplete: function() { el.textContent = text; }
      });
    }

    gsap.registerPlugin(ScrollTrigger);

    /* KV parallax on mouse */
    var kvImg = document.getElementById('kv-img');
    window.addEventListener('pointermove', function(e) {
      var x = (e.clientX / window.innerWidth - 0.5) * 12;
      var y = (e.clientY / window.innerHeight - 0.5) * 8;
      gsap.to(kvImg, { x: x, y: y, duration: 1, ease: 'power3.out' });
    });

    /* Dark overlay fades in as user scrolls past hero */
    gsap.to('#kv-overlay', {
      opacity: 0.85,
      ease: 'none',
      scrollTrigger: {
        trigger: '.tour-section',
        start: 'top 80%',
        end: 'top 20%',
        scrub: true,
      }
    });

    /* Tour panel slide up */
    gsap.fromTo('#tour-panel',
      { y: 60, opacity: 0 },
      { y: 0, opacity: 1, duration: 0.8, ease: 'power3.out',
        scrollTrigger: { trigger: '#tour-panel', start: 'top 85%' }
      }
    );

    /* Render tour dates */
    var datesEl = document.getElementById('dates');
    TOUR.forEach(function(d, i) {
      var row = document.createElement('div');
      row.className = 'date-row';
      row.innerHTML =
        '<span class="d-date">' + d.date + '</span>' +
        '<span class="d-city">' + d.city + '</span>' +
        '<span class="d-badge ' + d.badge + '">' + (d.badge ? d.badge.toUpperCase() : 'OPTION') + '</span>' +
        '<a href="#" class="d-cta">' + d.cta + '</a>';
      var cityEl = row.querySelector('.d-city');
      row.addEventListener('mouseenter', function() { scramble(cityEl, d.city); });
      datesEl.appendChild(row);

      gsap.fromTo(row,
        { opacity: 0, x: -20 },
        { opacity: 1, x: 0, duration: 0.4, delay: i * 0.05,
          scrollTrigger: { trigger: row, start: 'top 90%' }
        }
      );
    });

    /* Merch cities */
    var mc = document.getElementById('merch-cities');
    CITIES.forEach(function(c) {
      var p = document.createElement('div');
      p.style.cssText = 'font-size:5px; letter-spacing:0.18em; color:rgba(255,255,255,0.45); text-transform:uppercase;';
      p.textContent = c;
      mc.appendChild(p);
    });

    /* Merch cards reveal */
    document.querySelectorAll('.m-card').forEach(function(card, i) {
      gsap.fromTo(card,
        { opacity: 0, y: 60 },
        { opacity: 1, y: 0, duration: 0.7, delay: i * 0.15, ease: 'power3.out',
          scrollTrigger: { trigger: card, start: 'top 85%' }
        }
      );
    });
  </script>
</body>
</html>
