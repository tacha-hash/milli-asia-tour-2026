<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MILLI — JAA EHH! ASIA TOUR 2026</title>
  <meta name="theme-color" content="#FF0006" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    @font-face{font-family:'Kuunari';src:url('fonts/kuunari-black-condensed.otf') format('opentype');font-display:swap;}
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--red:#FF0006;--black:#0A0A0A;--white:#FAFAFA;}
    html{scroll-behavior:smooth;}
    body{background:var(--red);color:var(--black);font-family:'Barlow Condensed','Gotham',sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased;}

    /* HERO */
    .hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 0;position:relative;}
    .billboard-img{width:100vw;max-width:100%;height:auto;filter:drop-shadow(0 20px 60px rgba(0,0,0,0.4));will-change:transform;display:block;transition:filter 0.4s;}
    .billboard-img:hover{filter:drop-shadow(0 25px 80px rgba(0,0,0,0.5)) brightness(1.05);}

    /* BLACK FRAME extending from billboard down — truss/structure continuation */
    .black-frame{background:var(--black);color:var(--white);padding:2rem 1.5rem 3rem;position:relative;}
    .black-frame::before{content:'';position:absolute;top:-20px;left:50%;transform:translateX(-50%);width:90%;max-width:800px;height:20px;background:var(--black);clip-path:polygon(2% 0,98% 0,100% 100%,0 100%);}

    /* City grid inside black frame — 3 columns */
    .city-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.4rem 3rem;text-align:center;margin:1rem auto;max-width:600px;}
    .city-col{display:flex;flex-direction:column;gap:0.25rem;}
    .city-name{font-weight:800;font-size:clamp(11px,2vw,16px);letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;color:rgba(255,255,255,0.7);}
    .city-name:hover{color:var(--red);text-shadow:0 0 12px rgba(255,0,6,0.5);transform:scale(1.08);}
    .city-name.active{color:var(--red);text-shadow:0 0 15px rgba(255,0,6,0.6);}
    .tour-period{font-family:'Bebas Neue',sans-serif;font-size:clamp(18px,3.5vw,30px);letter-spacing:0.35em;text-align:center;margin-top:1rem;color:var(--white);}
    .frame-yupp{display:block;margin:1rem auto 0;height:18px;opacity:0.4;}

    /* Parallax lightning — sharp zigzag like artwork */
    .ltn{position:absolute;z-index:1;pointer-events:none;}
    .ltn-float{will-change:transform;}
    .ltn svg{fill:var(--black);}
    /* Depth layers — different sizes/opacities */
    .ltn.far{opacity:0.25;}
    .ltn.mid{opacity:0.5;}
    .ltn.near{opacity:0.75;}

    /* Scroll hint */
    .scroll-hint{text-align:center;padding:1rem 0;opacity:0.4;}
    .scroll-hint span{font-size:10px;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;color:var(--white);}
    .scroll-arrow{width:12px;height:12px;border-right:2px solid var(--white);border-bottom:2px solid var(--white);transform:rotate(45deg);margin:4px auto 0;animation:bounce 1.5s infinite;}
    @keyframes bounce{0%,100%{transform:rotate(45deg) translateY(0);}50%{transform:rotate(45deg) translateY(4px);}}

    /* WAVE BG — animated SVG wave lines */
    .wave-section{position:relative;overflow:hidden;padding:4rem 1.5rem;}
    .wave-canvas{position:absolute;inset:0;z-index:0;opacity:0.08;}
    .wave-content{position:relative;z-index:1;}

    /* TOUR DATES */
    .tour-dates{max-width:850px;margin:0 auto;}
    .tour-dates h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,5vw,52px);letter-spacing:0.06em;text-align:center;margin-bottom:0.5rem;}
    .tour-accent{width:32px;height:3px;background:var(--black);margin:0 auto 2rem;}
    .date-row{display:flex;justify-content:space-between;align-items:center;padding:0.9rem 0.5rem;border-bottom:1px solid rgba(0,0,0,0.15);cursor:pointer;transition:all 0.3s;}
    .date-row:hover{color:var(--white);background:rgba(0,0,0,0.1);padding-left:12px;}
    .date-row.highlight{color:var(--white);background:rgba(0,0,0,0.2);padding-left:12px;box-shadow:inset 4px 0 0 var(--black);}
    .d-city{font-family:'Bebas Neue',sans-serif;font-size:clamp(18px,3vw,28px);letter-spacing:0.04em;}
    .d-date{font-weight:700;font-size:12px;letter-spacing:0.18em;text-transform:uppercase;opacity:0.5;}
    .d-badge{font-size:10px;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;padding:3px 8px;border:1px solid rgba(0,0,0,0.25);white-space:nowrap;}
    .d-badge.show{border-color:var(--black);}
    .d-badge.homecoming{background:var(--black);color:var(--red);border-color:var(--black);}
    .d-badge.tbc{border-style:dashed;opacity:0.5;}

    /* MERCH */
    .merch-section{text-align:center;max-width:850px;margin:3rem auto 0;}
    .merch-section h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,5vw,52px);letter-spacing:0.06em;margin-bottom:1.5rem;}
    .merch-image{max-width:750px;width:100%;height:auto;filter:drop-shadow(0 12px 40px rgba(0,0,0,0.3));transition:transform 0.4s;}
    .merch-image:hover{transform:scale(1.02);}
    .preorder-btn{display:inline-block;margin-top:2rem;padding:0.9rem 3rem;background:var(--black);color:var(--white);font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.18em;text-decoration:none;transition:all 0.3s;}
    .preorder-btn:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(0,0,0,0.3);}
    .preorder-note{font-size:10px;letter-spacing:0.3em;opacity:0.4;margin-top:0.8rem;text-transform:uppercase;}

    /* FOOTER */
    .site-footer{padding:2rem;text-align:center;opacity:0.5;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;}
    .site-footer img{height:16px;display:block;margin:0 auto 6px;}

    /* Audio — tiny icon bottom-left */
    .audio-btn{position:fixed;bottom:16px;left:16px;z-index:100;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.15);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s;backdrop-filter:blur(4px);}
    .audio-btn:hover{background:rgba(0,0,0,0.8);}
    .audio-btn.playing{background:var(--red);border-color:var(--red);}

    @media(max-width:768px){
      .city-grid{grid-template-columns:1fr;max-width:200px;gap:0.15rem;}
      .date-row{flex-direction:column;align-items:flex-start;gap:4px;}
      .ltn{display:none;}
    }
  </style>
</head>
<body>

  <!-- HERO: billboard full bleed -->
  <section class="hero" id="hero">
    <!-- 3D parallax lightning — sharp zigzag SVG like artwork, depth layers -->
    <div class="ltn near" style="top:5%;left:6%;"><div class="ltn-float"><svg width="40" height="64" viewBox="0 0 40 64"><path d="M22 0L8 24h10L4 64l28-32H20L34 0z"/></svg></div></div>
    <div class="ltn near" style="top:8%;right:8%;"><div class="ltn-float"><svg width="36" height="56" viewBox="0 0 40 64"><path d="M22 0L8 24h10L4 64l28-32H20L34 0z"/></svg></div></div>
    <div class="ltn mid" style="top:2%;left:28%;"><div class="ltn-float"><svg width="28" height="44" viewBox="0 0 40 64"><path d="M22 0L8 24h10L4 64l28-32H20L34 0z"/></svg></div></div>
    <div class="ltn mid" style="top:6%;right:25%;"><div class="ltn-float"><svg width="30" height="48" viewBox="0 0 40 64"><path d="M22 0L8 24h10L4 64l28-32H20L34 0z"/></svg></div></div>
    <div class="ltn far" style="top:12%;left:18%;"><div class="ltn-float"><svg width="20" height="32" viewBox="0 0 40 64"><path d="M22 0L8 24h10L4 64l28-32H20L34 0z"/></svg></div></div>
    <div class="ltn far" style="top:4%;right:40%;"><div class="ltn-float"><svg width="18" height="28" viewBox="0 0 40 64"><path d="M22 0L8 24h10L4 64l28-32H20L34 0z"/></svg></div></div>
    <div class="ltn mid" style="bottom:22%;left:4%;"><div class="ltn-float"><svg width="32" height="50" viewBox="0 0 40 64"><path d="M22 0L8 24h10L4 64l28-32H20L34 0z"/></svg></div></div>
    <div class="ltn near" style="bottom:18%;right:5%;"><div class="ltn-float"><svg width="34" height="54" viewBox="0 0 40 64"><path d="M22 0L8 24h10L4 64l28-32H20L34 0z"/></svg></div></div>

    <img src="assets/billboard.png" alt="MILLI Billboard" class="billboard-img" id="bb" draggable="false" />
  </section>

  <!-- BLACK FRAME extending from billboard — truss structure continuation -->
  <div class="black-frame">
    <div class="city-grid" id="city-grid">
      <div class="city-col"><span class="city-name" data-city="TAIPEI">TAIWAN</span><span class="city-name" data-city="HONG KONG">HONG KONG</span><span class="city-name" data-city="SINGAPORE">SINGAPORE</span></div>
      <div class="city-col"><span class="city-name" data-city="KUALA LUMPUR">MALAYSIA</span><span class="city-name" data-city="TOKYO">JAPAN</span><span class="city-name" data-city="MANILA">PHILIPPINES</span><span class="city-name" data-city="JAKARTA">INDONESIA</span></div>
      <div class="city-col"><span class="city-name" data-city="SHANGHAI">CHINA</span><span class="city-name" data-city="BANGKOK">THAILAND</span><span class="city-name" data-city="SEOUL">SOUTH KOREA</span></div>
    </div>
    <p class="tour-period">JUNE — OCTOBER</p>
    <img src="assets/logo.png" alt="YUPP!" class="frame-yupp" />
    <div class="scroll-hint"><span>Tour Dates</span><div class="scroll-arrow"></div></div>
  </div>

  <!-- WAVE BG section: tour dates + merch -->
  <div class="wave-section">
    <canvas class="wave-canvas" id="wave-canvas"></canvas>
    <div class="wave-content">
      <section class="tour-dates" id="tour-dates"><h2>TOUR DATES</h2><div class="tour-accent"></div><div id="dates"></div></section>
      <section class="merch-section"><h2>MERCHANDISE</h2><img src="assets/ci-merch.png" alt="Tour Tee" class="merch-image" draggable="false" /><br /><a href="#" class="preorder-btn">PRE-ORDER</a><p class="preorder-note">Limited Edition — Ships June 2026</p></section>
    </div>
  </div>

  <footer class="site-footer"><img src="assets/logo.png" alt="YUPP!" /><span>&copy; 2026 YUPP! Entertainment</span></footer>

  <!-- Audio -->
  <audio id="audio" src="assets/jaaehh.mp3" preload="auto" loop></audio>
  <button class="audio-btn" id="audio-btn" title="Play/Pause">
    <svg id="play-ico" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>
    <svg id="pause-ico" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="5" y="3" width="5" height="18"/><rect x="14" y="3" width="5" height="18"/></svg>
  </button>

  <script>
    var TOUR=[
      {date:'26 JUN',city:'HONG KONG',badge:'show'},
      {date:'28 JUN',city:'TAIPEI',badge:'show'},
      {date:'03 JUL',city:'HONG KONG',badge:''},
      {date:'10 JUL',city:'SINGAPORE',badge:'show'},
      {date:'11 JUL',city:'KUALA LUMPUR',badge:'show'},
      {date:'26 JUL',city:'TOKYO',badge:'show'},
      {date:'09 AUG',city:'MANILA',badge:'show'},
      {date:'23 AUG',city:'JAKARTA',badge:'show'},
      {date:'13 SEP',city:'SHANGHAI',badge:'tbc'},
      {date:'03 OCT',city:'BANGKOK',badge:'homecoming'},
      {date:'18 OCT',city:'SEOUL',badge:'show'}
    ];

    function scramble(el,text){if(!el||!gsap)return;var chars='ABCDEFGHIJKLMNOPQRSTUVWXYZ!@#%',s={f:0};gsap.killTweensOf(s);gsap.to(s,{f:text.length*2,duration:0.4,ease:'power4.out',onUpdate:function(){var r=Math.floor(s.f/2);el.textContent=text.split('').map(function(c,i){return' /—'.indexOf(c)>=0?c:i<r?text[i]:chars[Math.floor(Math.random()*chars.length)]}).join('')},onComplete:function(){el.textContent=text}});}

    gsap.registerPlugin(ScrollTrigger);

    /* Billboard parallax */
    window.addEventListener('pointermove',function(e){var x=(e.clientX/innerWidth-0.5)*15,y=(e.clientY/innerHeight-0.5)*10;gsap.to('#bb',{x:x,y:y,duration:1,ease:'power3.out'});});

    /* Lightning — scroll parallax on outer, float on inner */
    document.querySelectorAll('.ltn').forEach(function(el,i){
      var speed=40+(i*25);
      gsap.to(el,{y:speed,ease:'none',scrollTrigger:{trigger:'body',start:'top top',end:'bottom bottom',scrub:true}});
    });
    document.querySelectorAll('.ltn-float').forEach(function(el,i){
      gsap.to(el,{y:'+=5',rotation:'+=3',duration:2.5+i*0.3,repeat:-1,yoyo:true,ease:'sine.inOut'});
    });

    /* City auto-scramble */
    var allCities=document.querySelectorAll('.city-name'),ci=0;
    function nextCity(){var el=allCities[ci%allCities.length];if(!el.dataset.t)el.dataset.t=el.textContent;scramble(el,el.dataset.t);ci++;}
    nextCity();setInterval(nextCity,800);

    /* City click → scroll to matching tour date + highlight */
    allCities.forEach(function(el){
      el.addEventListener('mouseenter',function(){scramble(el,el.dataset.t||el.textContent);});
      el.addEventListener('click',function(){
        var target=el.dataset.city;
        var rows=document.querySelectorAll('.date-row');
        rows.forEach(function(r){r.classList.remove('highlight');});
        if(!target){document.getElementById('tour-dates').scrollIntoView({behavior:'smooth',block:'start'});return;}
        var found=false;
        rows.forEach(function(r){
          if(r.querySelector('.d-city').textContent===target){
            r.classList.add('highlight');
            if(!found){r.scrollIntoView({behavior:'smooth',block:'center'});found=true;}
          }
        });
        if(!found)document.getElementById('tour-dates').scrollIntoView({behavior:'smooth',block:'start'});
      });
    });

    /* Tour dates render */
    var datesEl=document.getElementById('dates');
    TOUR.forEach(function(t,i){
      var r=document.createElement('div');r.className='date-row';
      r.innerHTML='<span class="d-city">'+t.city+'</span><span class="d-date">'+t.date+'</span><span class="d-badge '+t.badge+'">'+(t.badge?t.badge.toUpperCase():'OPTION')+'</span>';
      var rc=r.querySelector('.d-city');
      r.addEventListener('mouseenter',function(){scramble(rc,t.city);});
      datesEl.appendChild(r);
      gsap.fromTo(r,{opacity:0,x:-20},{opacity:1,x:0,duration:0.4,delay:i*0.05,scrollTrigger:{trigger:r,start:'top 90%'}});
    });

    gsap.fromTo('.merch-image',{opacity:0,y:40},{opacity:1,y:0,duration:0.8,scrollTrigger:{trigger:'.merch-section',start:'top 80%'}});

    /* Wave background — animated canvas lines */
    (function(){
      var c=document.getElementById('wave-canvas'),ctx=c.getContext('2d');
      function resize(){c.width=c.offsetWidth;c.height=c.offsetHeight;}
      resize();window.addEventListener('resize',resize);
      var t=0;
      function draw(){
        ctx.clearRect(0,0,c.width,c.height);
        ctx.strokeStyle='rgba(0,0,0,0.6)';
        ctx.lineWidth=1.5;
        for(var w=0;w<6;w++){
          ctx.beginPath();
          for(var x=0;x<c.width;x+=4){
            var y=c.height*0.15+w*(c.height*0.14)+Math.sin(x*0.008+t+w*0.8)*30+Math.sin(x*0.003+t*0.5+w)*20;
            x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
          }
          ctx.stroke();
        }
        t+=0.015;
        requestAnimationFrame(draw);
      }
      draw();
    })();

    /* Audio — autoplay on first interaction (browser policy) */
    var audio=document.getElementById('audio'),abtn=document.getElementById('audio-btn'),pIco=document.getElementById('play-ico'),paIco=document.getElementById('pause-ico');
    function playAudio(){audio.volume=0.3;audio.play().then(function(){abtn.classList.add('playing');pIco.style.display='none';paIco.style.display='block';}).catch(function(){});}
    function pauseAudio(){audio.pause();abtn.classList.remove('playing');pIco.style.display='block';paIco.style.display='none';}
    abtn.addEventListener('click',function(){audio.paused?playAudio():pauseAudio();});
    /* Try autoplay on first user interaction */
    document.addEventListener('click',function tryPlay(){playAudio();document.removeEventListener('click',tryPlay);},{once:true});
    document.addEventListener('scroll',function tryPlay2(){playAudio();document.removeEventListener('scroll',tryPlay2);},{once:true});
  </script>
</body>
</html>
