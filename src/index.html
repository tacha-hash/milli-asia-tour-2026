<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MILLI — JAA EHH! ASIA TOUR 2026</title>
  <meta name="theme-color" content="#DA2D40" />

  <!-- Fonts: Bebas Neue (Kuunari stand-in) + Barlow Condensed (Gotham stand-in) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <!-- Local fonts if available -->
  <style>
    @font-face { font-family: 'Kuunari'; src: url('fonts/kuunari-black-condensed.otf') format('opentype'); font-display: swap; }
    @font-face { font-family: 'Gotham'; src: url('fonts/Gotham-Bold.otf') format('opentype'); font-display: swap; }
  </style>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    :root {
      --red: #DA2D40;
      --black: #0A0A0A;
      --white: #FFFFFF;
    }

    body {
      background: var(--red);
      color: var(--white);
      font-family: 'Barlow Condensed', 'Gotham', 'Impact', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ========== HERO: ARTWORK IS THE PAGE ========== */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 700px;
      background: var(--red);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero-artwork {
      position: relative;
      width: 90vw;
      max-width: 700px;
      z-index: 2;
      will-change: transform;
    }

    .hero-artwork img {
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 20px 60px rgba(0,0,0,0.4));
    }

    /* Grain overlay */
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
    }

    .scroll-hint {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0.7;
    }

    .scroll-hint span {
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--black);
    }

    .scroll-arrow {
      width: 20px;
      height: 20px;
      border-right: 2px solid var(--black);
      border-bottom: 2px solid var(--black);
      transform: rotate(45deg);
      animation: bounce 1.5s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: rotate(45deg) translateY(0); }
      50% { transform: rotate(45deg) translateY(6px); }
    }

    /* ========== BILLBOARD TRANSITION: RED → DARK ========== */
    .billboard-zone {
      position: relative;
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
      background: linear-gradient(180deg, var(--red) 0%, var(--red) 30%, var(--black) 100%);
    }

    .billboard-float {
      width: 50vw;
      max-width: 550px;
      perspective: 1200px;
    }

    .billboard-float img {
      width: 100%;
      height: auto;
      display: block;
      transform-style: preserve-3d;
      filter: drop-shadow(0 30px 80px rgba(0,0,0,0.5));
    }

    /* ========== TOUR DATES ========== */
    .tour-dates {
      background: var(--black);
      padding: 80px 24px 60px;
    }

    .tour-dates h2 {
      font-family: 'Bebas Neue', 'Kuunari', sans-serif;
      font-size: clamp(40px, 6vw, 72px);
      letter-spacing: 0.05em;
      text-align: center;
      margin-bottom: 16px;
    }

    .accent-line {
      width: 40px;
      height: 3px;
      background: var(--red);
      margin: 0 auto 50px;
    }

    .dates-grid {
      max-width: 900px;
      margin: 0 auto;
    }

    .date-row {
      display: grid;
      grid-template-columns: 100px 1fr auto auto;
      align-items: center;
      gap: 12px;
      padding: 16px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      transition: background 0.3s, padding-left 0.3s;
      cursor: pointer;
    }

    .date-row:hover {
      background: rgba(218, 45, 64, 0.1);
      padding-left: 16px;
    }

    .date-row .date-label {
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    .date-row .city-name {
      font-family: 'Bebas Neue', 'Kuunari', sans-serif;
      font-size: clamp(20px, 3vw, 28px);
      letter-spacing: 0.04em;
      color: var(--white);
      transition: text-shadow 0.2s;
    }

    .date-row:hover .city-name {
      text-shadow: 2px 0 var(--red), -2px 0 rgba(0,255,255,0.3);
    }

    .date-row .badge {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 4px 10px;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6);
      white-space: nowrap;
    }

    .badge.show { border-color: var(--red); color: var(--red); }
    .badge.homecoming { border-color: var(--red); color: var(--black); background: var(--red); }
    .badge.tbc { border-style: dashed; border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.35); }

    .date-row .cta-btn {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 8px 20px;
      border: 1px solid var(--white);
      color: var(--white);
      background: transparent;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .cta-btn:hover { background: var(--red); border-color: var(--red); }

    /* ========== MERCH: PREMIUM STREETWEAR ========== */
    .merch {
      background: var(--black);
      padding: 100px 24px;
      position: relative;
    }

    .merch h2 {
      font-family: 'Bebas Neue', 'Kuunari', sans-serif;
      font-size: clamp(40px, 6vw, 72px);
      letter-spacing: 0.05em;
      text-align: center;
      margin-bottom: 8px;
    }

    .merch-subtitle {
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 60px;
    }

    .merch-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      max-width: 900px;
      margin: 0 auto;
    }

    .merch-card {
      perspective: 800px;
    }

    .merch-card-inner {
      background: #111;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.05);
      overflow: hidden;
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.4s;
      transform-style: preserve-3d;
    }

    .merch-card:hover .merch-card-inner {
      transform: rotateY(5deg) rotateX(-2deg) scale(1.02);
      box-shadow: 0 20px 60px rgba(218,45,64,0.15);
    }

    .merch-visual {
      aspect-ratio: 3/4;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
    }

    .merch-visual::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(218,45,64,0.05), transparent);
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }

    .merch-card:hover .merch-visual::after { opacity: 1; }

    /* Tee shape via clip-path */
    .tee-shape {
      width: 70%;
      max-width: 220px;
      position: relative;
    }

    .tee-body {
      background: #1C1C1C;
      padding: 60px 20px 30px;
      clip-path: polygon(15% 0, 0% 15%, 0% 100%, 100% 100%, 100% 15%, 85% 0, 62% 8%, 50% 10%, 38% 8%);
    }

    .merch-info {
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .merch-info .label {
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .merch-info .detail {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.3);
      margin-top: 4px;
      text-transform: uppercase;
    }

    .merch-info .price {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--red);
    }

    .preorder-cta {
      display: block;
      max-width: 400px;
      margin: 60px auto 0;
      text-align: center;
      padding: 16px 40px;
      background: var(--red);
      color: var(--white);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 0.15em;
      text-decoration: none;
      transition: all 0.3s;
      animation: pulse-ring 2s infinite;
    }

    .preorder-cta:hover {
      background: #B71C2E;
      transform: scale(1.04);
      box-shadow: 0 0 40px rgba(218,45,64,0.3);
    }

    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(218,45,64,0.4); }
      70% { box-shadow: 0 0 0 12px rgba(218,45,64,0); }
      100% { box-shadow: 0 0 0 0 rgba(218,45,64,0); }
    }

    .preorder-note {
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.2);
      margin-top: 16px;
      text-transform: uppercase;
    }

    /* ========== FOOTER ========== */
    .site-footer {
      background: var(--black);
      border-top: 1px solid rgba(255,255,255,0.05);
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
    }

    .site-footer img { height: 18px; filter: invert(1); opacity: 0.4; }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 768px) {
      .date-row {
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 14px 8px;
      }
      .date-row .cta-btn { justify-self: start; }
      .merch-grid { grid-template-columns: 1fr; max-width: 400px; }
      .billboard-float { width: 80vw; }
    }
  </style>
</head>
<body>

  <!-- ==================== HERO: ARTWORK IS KING ==================== -->
  <section class="hero" id="hero">
    <div class="hero-artwork" id="hero-artwork">
      <img src="https://lh3.googleusercontent.com/d/1O01RuN39YZoxKRqYumS1OFJ7rzbl1aDn"
           alt="MILLI JAA-EHH! ASIA TOUR 2026" draggable="false" />
    </div>
    <div class="scroll-hint">
      <span>Scroll</span>
      <div class="scroll-arrow"></div>
    </div>
  </section>

  <!-- ==================== BILLBOARD 3D TRANSITION ==================== -->
  <section class="billboard-zone">
    <div class="billboard-float">
      <img id="billboard-img" src="https://lh3.googleusercontent.com/d/1XhHiSV1EeCzHYEDFN8eOQt2H6_ZiO4AA"
           alt="MILLI Billboard" draggable="false" />
    </div>
  </section>

  <!-- ==================== TOUR DATES ==================== -->
  <section class="tour-dates" id="tour-dates">
    <h2>TOUR DATES</h2>
    <div class="accent-line"></div>
    <div class="dates-grid" id="dates-grid"></div>
  </section>

  <!-- ==================== MERCH ==================== -->
  <section class="merch" id="merch">
    <h2>MERCHANDISE</h2>
    <p class="merch-subtitle">Official Tour Collection</p>

    <div class="merch-grid">
      <!-- FRONT -->
      <div class="merch-card">
        <div class="merch-card-inner">
          <div class="merch-visual">
            <div class="tee-shape">
              <div class="tee-body" style="text-align:center; padding-top:50px;">
                <div style="background:var(--red); display:inline-block; padding:4px 14px;">
                  <span style="font-family:'Bebas Neue',sans-serif; font-size:12px; letter-spacing:0.15em; color:#fff;">JAA EHH!</span>
                </div>
                <div style="height:100px;"></div>
              </div>
            </div>
          </div>
          <div class="merch-info">
            <div>
              <div class="label">Tour Tee — Front</div>
              <div class="detail">Oversized / Black</div>
            </div>
            <div class="price">&#3647;1,490</div>
          </div>
        </div>
      </div>

      <!-- BACK -->
      <div class="merch-card">
        <div class="merch-card-inner">
          <div class="merch-visual">
            <div class="tee-shape">
              <div class="tee-body" style="text-align:center; padding-top:20px; overflow:hidden;">
                <img src="https://lh3.googleusercontent.com/d/1O01RuN39YZoxKRqYumS1OFJ7rzbl1aDn"
                     alt="KV print" style="width:85%; margin:0 auto 8px; display:block; border-radius:2px;" />
                <div id="merch-cities" style="line-height:1.6;"></div>
                <div style="font-size:5px; letter-spacing:0.15em; color:rgba(255,255,255,0.2); margin-top:6px;">
                  YUPP! ENTERTAINMENT
                </div>
              </div>
            </div>
          </div>
          <div class="merch-info">
            <div>
              <div class="label">Tour Tee — Back</div>
              <div class="detail">KV Full Print / 10 Cities</div>
            </div>
            <div class="price">&#3647;1,490</div>
          </div>
        </div>
      </div>
    </div>

    <a href="#" class="preorder-cta">PRE-ORDER NOW</a>
    <p class="preorder-note">Limited Edition — Ships June 2026</p>
  </section>

  <!-- ==================== FOOTER ==================== -->
  <footer class="site-footer">
    <img src="https://lh3.googleusercontent.com/d/1Bu6B29MUjbjdAfrU5ONhpifjikvLS97F" alt="YUPP!" />
    <span>&copy; 2026 YUPP! Entertainment</span>
  </footer>

  <!-- ==================== SCRIPTS ==================== -->
  <script>
    /* ─── DATA ─── */
    const CITIES = ['TAIWAN','HONG KONG','SINGAPORE','MALAYSIA','JAPAN','PHILIPPINES','INDONESIA','CHINA','THAILAND','SOUTH KOREA'];

    const TOUR = [
      { date: '26 JUN', city: 'HONG KONG', badge: 'show', cta: 'TICKETS' },
      { date: '28 JUN', city: 'TAIPEI', badge: 'show', cta: 'TICKETS' },
      { date: '03 JUL', city: 'HONG KONG', badge: '', cta: 'WAITLIST' },
      { date: '10 JUL', city: 'SINGAPORE', badge: 'show', cta: 'TICKETS' },
      { date: '11 JUL', city: 'KUALA LUMPUR', badge: 'show', cta: 'TICKETS' },
      { date: 'JUL—SEP', city: 'MANILA / JAKARTA / TOKYO / BEIJING', badge: 'tbc', cta: 'NOTIFY' },
      { date: '03 OCT', city: 'BANGKOK', badge: 'homecoming', cta: 'TICKETS' },
    ];

    /* ─── SCRAMBLE TEXT ─── */
    function scramble(el, text, dur) {
      if (!el || !gsap) return;
      dur = dur || 0.4;
      var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%';
      var s = { f: 0 };
      gsap.killTweensOf(s);
      gsap.to(s, {
        f: text.length * 2, duration: dur, ease: 'power4.out',
        onUpdate: function() {
          var r = Math.floor(s.f / 2);
          el.textContent = text.split('').map(function(c, i) {
            if (' /—'.indexOf(c) >= 0) return c;
            return i < r ? text[i] : chars[Math.floor(Math.random() * chars.length)];
          }).join('');
        },
        onComplete: function() { el.textContent = text; }
      });
    }

    /* ─── HERO PARALLAX ─── */
    (function() {
      var art = document.getElementById('hero-artwork');
      if (!art) return;
      window.addEventListener('pointermove', function(e) {
        var x = (e.clientX / window.innerWidth - 0.5) * 15;
        var y = (e.clientY / window.innerHeight - 0.5) * 10;
        gsap.to(art, { x: x, y: y, duration: 1.2, ease: 'power3.out' });
      });
    })();

    /* ─── BILLBOARD 3D SCROLL ─── */
    gsap.registerPlugin(ScrollTrigger);

    gsap.fromTo('#billboard-img',
      { rotateX: 15, scale: 0.85, opacity: 0, y: 80 },
      {
        rotateX: 0, scale: 1, opacity: 1, y: 0,
        ease: 'power3.out',
        scrollTrigger: {
          trigger: '#billboard-img',
          start: 'top 90%',
          end: 'top 35%',
          scrub: 1.5,
        }
      }
    );

    /* ─── TOUR DATES RENDER ─── */
    (function() {
      var grid = document.getElementById('dates-grid');
      TOUR.forEach(function(d, i) {
        var row = document.createElement('div');
        row.className = 'date-row';
        row.innerHTML =
          '<span class="date-label">' + d.date + '</span>' +
          '<span class="city-name">' + d.city + '</span>' +
          '<span class="badge ' + d.badge + '">' + (d.badge ? d.badge.toUpperCase() : 'OPTION') + '</span>' +
          '<a href="#" class="cta-btn">' + d.cta + '</a>';

        // Hover scramble
        var cityEl = row.querySelector('.city-name');
        row.addEventListener('mouseenter', function() {
          scramble(cityEl, d.city, 0.3);
        });

        grid.appendChild(row);

        // Stagger reveal
        gsap.fromTo(row,
          { opacity: 0, x: -30 },
          {
            opacity: 1, x: 0, duration: 0.5, delay: i * 0.06,
            scrollTrigger: { trigger: row, start: 'top 90%' }
          }
        );
      });
    })();

    /* ─── MERCH CITIES ─── */
    (function() {
      var el = document.getElementById('merch-cities');
      if (!el) return;
      CITIES.forEach(function(c) {
        var p = document.createElement('div');
        p.style.cssText = 'font-size:6px; letter-spacing:0.2em; color:rgba(255,255,255,0.5); text-transform:uppercase;';
        p.textContent = c;
        el.appendChild(p);
      });
    })();

    /* ─── MERCH SCROLL REVEAL ─── */
    document.querySelectorAll('.merch-card').forEach(function(card, i) {
      gsap.fromTo(card,
        { opacity: 0, y: 80, rotateX: 8 },
        {
          opacity: 1, y: 0, rotateX: 0,
          duration: 0.9, delay: i * 0.2, ease: 'power3.out',
          scrollTrigger: { trigger: card, start: 'top 85%' }
        }
      );
    });
  </script>

</body>
</html>
